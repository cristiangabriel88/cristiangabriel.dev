<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- ###### CG PORTFOLIO FAVICON ###### -->
  <!-- Echoes the sidebar brand-mark sigil: two asymmetric leaves on a stem -->

  <!-- parchment rounded-square base (stays legible on light + dark tabs) -->
  <rect width="32" height="32" rx="7" fill="#FAF7F2"/>

  <!-- curved stem -->
  <path d="M 16 29 C 16 23 15 19 14.5 15"
        stroke="#2D5016" stroke-width="1.6" stroke-linecap="round" fill="none"/>

  <!-- primary filled leaf (left-leaning) -->
  <path d="M 14.5 15 C 3.5 11.5 2.5 4 5 1.5 C 15 3 18.5 9.5 14.5 15 Z"
        fill="#2D5016"/>

  <!-- secondary outlined leaf (right, smaller, offset down) -->
  <path d="M 16 20 C 25.5 17.5 29 11 28 5.5 C 19 7 15 14.5 16 20 Z"
        stroke="#2D5016" stroke-width="1.5" fill="none" stroke-linejoin="round"/>

  <!-- tiny seed dot at base -->
  <circle cx="16" cy="29" r="1.3" fill="#2D5016"/>
</svg>
